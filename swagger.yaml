openapi: 3.0.3
info:
  title: Stray Animals Shelter Management System API
  description: REST API for managing animal shelter operations including authentication, animal management, adoptions, rescue missions, care logs, and employee management.
  version: 1.0.0
  contact:
    name: Shelter Admin
    email: admin@shelter.com

servers:
  - url: http://localhost:3000/api/v1
    description: Development server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Animals
    description: Animal management operations
  - name: Adoptions
    description: Animal adoption processing with transactions
  - name: Rescues
    description: Rescue reports and mission management
  - name: Care Logs
    description: Animal care and medical logs
  - name: Employees
    description: Employee management operations

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login endpoint

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john.doe@shelter.com
        password:
          type: string
          format: password
          example: password123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        employee:
          type: object
          properties:
            employee_id:
              type: integer
              example: 1
            email:
              type: string
              example: john.doe@shelter.com
            role:
              type: string
              example: Manager
            branch_id:
              type: integer
              example: 1

    Employee:
      type: object
      properties:
        employee_id:
          type: integer
          example: 1
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@shelter.com
        phone:
          type: string
          example: +92-300-1234567
        role:
          type: string
          enum: [Manager, Veterinarian, Rescuer, Caretaker, Admin]
          example: Manager
        branch_id:
          type: integer
          example: 1
        salary:
          type: number
          format: decimal
          example: 85000.00
        hire_date:
          type: string
          format: date
          example: 2023-01-15

    Animal:
      type: object
      properties:
        animal_id:
          type: integer
          example: 1
        name:
          type: string
          example: Max
        species_id:
          type: integer
          example: 1
        breed:
          type: string
          example: Labrador
        age_years:
          type: integer
          example: 3
        gender:
          type: string
          enum: [Male, Female, Unknown]
          example: Male
        weight_kg:
          type: number
          format: decimal
          example: 25.5
        color:
          type: string
          example: Golden
        status:
          type: string
          enum: [Available, Adopted, Medical Treatment, Quarantine, Deceased]
          example: Available
        branch_id:
          type: integer
          example: 1
        rescue_date:
          type: string
          format: date
          example: 2024-01-10
        description:
          type: string
          example: Friendly and energetic dog

    CreateAnimalRequest:
      type: object
      required:
        - name
        - species_id
        - branch_id
      properties:
        name:
          type: string
          example: Max
        species_id:
          type: integer
          example: 1
        breed:
          type: string
          example: Labrador
        age_years:
          type: integer
          example: 3
        gender:
          type: string
          enum: [Male, Female, Unknown]
          example: Male
        weight_kg:
          type: number
          example: 25.5
        color:
          type: string
          example: Golden
        status:
          type: string
          example: Available
        branch_id:
          type: integer
          example: 1
        rescue_date:
          type: string
          format: date
          example: 2024-01-10
        description:
          type: string
          example: Friendly dog

    Adoption:
      type: object
      properties:
        adoption_id:
          type: integer
          example: 1
        animal_id:
          type: integer
          example: 5
        adopter_name:
          type: string
          example: Jane Smith
        adopter_contact:
          type: string
          example: +92-301-9876543
        adopter_address:
          type: string
          example: 123 Main St, Karachi
        adoption_date:
          type: string
          format: date
          example: 2024-03-15
        adoption_fee:
          type: number
          format: decimal
          example: 5000.00
        status:
          type: string
          enum: [Pending, Approved, Rejected, Completed]
          example: Completed
        notes:
          type: string
          example: Good family with experience

    CreateAdoptionRequest:
      type: object
      required:
        - animal_id
        - adopter_name
        - adopter_contact
        - adoption_fee
      properties:
        animal_id:
          type: integer
          example: 5
        adopter_name:
          type: string
          example: Jane Smith
        adopter_contact:
          type: string
          example: +92-301-9876543
        adopter_address:
          type: string
          example: 123 Main St, Karachi
        adoption_fee:
          type: number
          example: 5000.00
        notes:
          type: string
          example: Good family

    Report:
      type: object
      properties:
        report_id:
          type: integer
          example: 1
        reporter_name:
          type: string
          example: Ali Ahmed
        reporter_contact:
          type: string
          example: +92-300-1111111
        city_id:
          type: integer
          example: 1
        location:
          type: string
          example: Near City Park
        description:
          type: string
          example: Injured dog needs rescue
        status:
          type: string
          enum: [Pending, Assigned, Resolved]
          example: Pending
        report_date:
          type: string
          format: date-time
          example: 2024-03-16T10:30:00Z

    CreateReportRequest:
      type: object
      required:
        - reporter_name
        - reporter_contact
        - city_id
        - location
        - description
      properties:
        reporter_name:
          type: string
          example: Ali Ahmed
        reporter_contact:
          type: string
          example: +92-300-1111111
        city_id:
          type: integer
          example: 1
        location:
          type: string
          example: Near City Park
        description:
          type: string
          example: Injured dog needs rescue

    Mission:
      type: object
      properties:
        mission_id:
          type: integer
          example: 1
        team_id:
          type: integer
          example: 1
        report_id:
          type: integer
          example: 5
        dispatch_date:
          type: string
          format: date-time
          example: 2024-03-16T14:00:00Z
        completion_date:
          type: string
          format: date-time
          example: 2024-03-16T18:00:00Z
        status:
          type: string
          enum: [Dispatched, In Progress, Completed, Failed]
          example: Dispatched
        notes:
          type: string
          example: Team dispatched to location

    CreateMissionRequest:
      type: object
      required:
        - team_id
        - report_id
      properties:
        team_id:
          type: integer
          example: 1
        report_id:
          type: integer
          example: 5
        notes:
          type: string
          example: Team dispatched

    CareLog:
      type: object
      properties:
        log_id:
          type: integer
          example: 1
        animal_id:
          type: integer
          example: 5
        employee_id:
          type: integer
          example: 2
        log_date:
          type: string
          format: date-time
          example: 2024-03-16T09:00:00Z
        care_type:
          type: string
          enum: [Feeding, Medical, Grooming, Exercise, Other]
          example: Medical
        description:
          type: string
          example: Vaccination administered
        next_scheduled:
          type: string
          format: date
          example: 2024-04-16

    CreateCareLogRequest:
      type: object
      required:
        - care_type
        - description
      properties:
        care_type:
          type: string
          enum: [Feeding, Medical, Grooming, Exercise, Other]
          example: Medical
        description:
          type: string
          example: Vaccination administered
        next_scheduled:
          type: string
          format: date
          example: 2024-04-16

    SurrenderRequest:
      type: object
      required:
        - name
        - species_id
        - branch_id
        - surrenderer_name
        - surrenderer_contact
      properties:
        name:
          type: string
          example: Buddy
        species_id:
          type: integer
          example: 1
        breed:
          type: string
          example: Beagle
        age_years:
          type: integer
          example: 2
        gender:
          type: string
          example: Male
        weight_kg:
          type: number
          example: 15.0
        color:
          type: string
          example: Brown
        branch_id:
          type: integer
          example: 1
        description:
          type: string
          example: Friendly dog
        surrenderer_name:
          type: string
          example: Sara Khan
        surrenderer_contact:
          type: string
          example: +92-300-2222222
        reason:
          type: string
          example: Moving abroad

    CreateEmployeeRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - role
        - branch_id
        - salary
      properties:
        first_name:
          type: string
          example: Ahmed
        last_name:
          type: string
          example: Ali
        email:
          type: string
          format: email
          example: ahmed.ali@shelter.com
        phone:
          type: string
          example: +92-300-3333333
        role:
          type: string
          enum: [Manager, Veterinarian, Rescuer, Caretaker, Admin]
          example: Veterinarian
        branch_id:
          type: integer
          example: 1
        salary:
          type: number
          example: 75000.00

paths:
  /health:
    get:
      summary: Health check endpoint
      tags:
        - Health
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /auth/login:
    post:
      summary: Authenticate user and receive JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Get current authenticated user details
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  employee:
                    $ref: '#/components/schemas/Employee'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Employee not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /animals:
    get:
      summary: Get all animals with optional filters
      tags:
        - Animals
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Available, Adopted, Medical Treatment, Quarantine, Deceased]
        - name: species_id
          in: query
          schema:
            type: integer
        - name: branch_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of animals
          content:
            application/json:
              schema:
                type: object
                properties:
                  animals:
                    type: array
                    items:
                      $ref: '#/components/schemas/Animal'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new animal record
      description: Requires Manager or Veterinarian role
      tags:
        - Animals
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnimalRequest'
      responses:
        '201':
          description: Animal created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  animal:
                    $ref: '#/components/schemas/Animal'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /animals/{id}:
    get:
      summary: Get animal by ID
      tags:
        - Animals
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Animal details
          content:
            application/json:
              schema:
                type: object
                properties:
                  animal:
                    $ref: '#/components/schemas/Animal'
        '404':
          description: Animal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Update animal details
      description: Requires Manager or Veterinarian role
      tags:
        - Animals
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnimalRequest'
      responses:
        '200':
          description: Animal updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  animal:
                    $ref: '#/components/schemas/Animal'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Animal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete animal record
      description: Requires Manager role
      tags:
        - Animals
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Animal deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Animal deleted successfully
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Animal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /animals/surrender:
    post:
      summary: Process animal surrender with transaction
      description: Transaction Scenario 3 - Creates animal, sale record, and schedules health check. Requires Manager or Admin role.
      tags:
        - Animals
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurrenderRequest'
      responses:
        '201':
          description: Animal surrender processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  animal:
                    $ref: '#/components/schemas/Animal'
                  sale:
                    type: object
                    properties:
                      sale_id:
                        type: integer
                      transaction_type:
                        type: string
                        example: Surrender
                  careLog:
                    $ref: '#/components/schemas/CareLog'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Transaction failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /animals/{animal_id}/care-logs:
    get:
      summary: Get care logs for specific animal
      tags:
        - Care Logs
      security:
        - bearerAuth: []
      parameters:
        - name: animal_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of care logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  careLogs:
                    type: array
                    items:
                      $ref: '#/components/schemas/CareLog'

    post:
      summary: Create care log entry
      description: Requires Veterinarian, Caretaker, or Manager role
      tags:
        - Care Logs
      security:
        - bearerAuth: []
      parameters:
        - name: animal_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCareLogRequest'
      responses:
        '201':
          description: Care log created
          content:
            application/json:
              schema:
                type: object
                properties:
                  careLog:
                    $ref: '#/components/schemas/CareLog'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /adoptions:
    get:
      summary: Get all adoptions
      description: Requires Manager or Admin role
      tags:
        - Adoptions
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Pending, Approved, Rejected, Completed]
      responses:
        '200':
          description: List of adoptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  adoptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Adoption'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create new adoption with transaction
      description: Transaction Scenario 1 - Locks animal, creates adoption, updates animal status. Requires Manager or Admin role.
      tags:
        - Adoptions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdoptionRequest'
      responses:
        '201':
          description: Adoption created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  adoption:
                    $ref: '#/components/schemas/Adoption'
        '400':
          description: Missing required fields or animal not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Animal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Transaction failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /adoptions/{id}:
    get:
      summary: Get adoption by ID
      description: Requires Manager or Admin role
      tags:
        - Adoptions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Adoption details
          content:
            application/json:
              schema:
                type: object
                properties:
                  adoption:
                    $ref: '#/components/schemas/Adoption'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Adoption not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /adoptions/{id}/status:
    patch:
      summary: Update adoption status with transaction
      description: Updates adoption and animal status. Requires Manager or Admin role.
      tags:
        - Adoptions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [Approved, Rejected, Completed]
                  example: Approved
      responses:
        '200':
          description: Adoption status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  adoption:
                    $ref: '#/components/schemas/Adoption'
        '400':
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Adoption not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Transaction failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /rescues/reports:
    get:
      summary: Get all rescue reports
      description: Requires Manager, Rescuer, or Admin role
      tags:
        - Rescues
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Pending, Assigned, Resolved]
      responses:
        '200':
          description: List of rescue reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create new rescue report
      description: Public endpoint - no authentication required
      tags:
        - Rescues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    $ref: '#/components/schemas/Report'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /rescues/missions:
    get:
      summary: Get all rescue missions
      description: Requires Manager or Rescuer role
      tags:
        - Rescues
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Dispatched, In Progress, Completed, Failed]
      responses:
        '200':
          description: List of missions
          content:
            application/json:
              schema:
                type: object
                properties:
                  missions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Mission'
        '403':
          description: Forbidden - Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create and dispatch rescue mission with transaction
      description: Transaction Scenario 2 - Validates team, updates report, creates mission. Requires Manager or Rescuer role.
      tags:
        - Rescues
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
